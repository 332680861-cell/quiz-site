<!DOCTYPE html>
<html lang="zh-CN">

        :root {

            --radius: 12px;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;

        header {

        .header-inner { display: flex; align-items: center; justify-content: space-between; }
        .logo { font-size: 20px; font-weight: 700; color: var(--gray-900); }
        .logo span { color: var(--primary); }
        .page { display: none; padding: 32px 0 60px; }
        .page.active { display: block; }
        .hero { text-align: center; margin-bottom: 40px; }
        .hero h1 { font-size: 28px; font-weight: 700; margin-bottom: 12px; }
        .hero p { font-size: 16px; color: var(--gray-500); }
        .quiz-list { display: grid; gap: 16px; }
        .quiz-card {
            background: var(--white); border-radius: var(--radius); padding: 24px;
            box-shadow: var(--shadow); cursor: pointer; transition: all 0.2s ease;
            border: 1px solid var(--gray-100);
        }
        .quiz-card:hover { box-shadow: var(--shadow-md); transform: translateY(-2px); }

            width: 48px; height: 48px;

            justify-content: center; font-size: 24px; margin-bottom: 16px;

        .quiz-card p { font-size: 14px; color: var(--gray-500); margin-bottom: 16px; }
        .quiz-meta { display: flex; gap: 16px; font-size: 13px; color: var(--gray-500); }
        .quiz-meta span { display: flex; align-items: center; gap: 4px; }
        .quiz-header { margin-bottom: 32px; }
        .back-btn {
            display: inline-flex; align-items: center; gap: 6px; color: var(--gray-500);
            font-size: 14px; cursor: pointer; margin-bottom: 20px; padding: 8px 0; border: none; background: none;

        .back-btn:hover { color: var(--gray-700); }
        .quiz-title { font-size: 24px; font-weight: 700; margin-bottom: 8px; }
        .quiz-desc { font-size: 15px; color: var(--gray-500); }
        .progress-bar {
            height: 4px; background: var(--gray-200); border-radius: 2px;

        .progress-fill { height: 100%; background: var(--primary); border-radius: 2px; transition: width 0.3s ease; }
        .question-counter { font-size: 13px; color: var(--gray-500); margin-bottom: 8px; }
        .question-card {
            background: var(--white); border-radius: var(--radius); padding: 24px;
            box-shadow: var(--shadow); margin-bottom: 24px;
        }
        .question-text { font-size: 17px; font-weight: 600; margin-bottom: 20px; line-height: 1.5; }
        .options { display: grid; gap: 12px; }
        .option {
            padding: 16px; border: 2px solid var(--gray-200); border-radius: 10px;
            cursor: pointer; transition: all 0.2s ease; font-size: 15px;
        }
        .option:hover { border-color: var(--primary-light); background: #f0f7ff; }
        .option.selected { border-color: var(--primary); background: #eff6ff; }

        .likert-scale { display: flex; gap: 8px; justify-content: space-between; }
        .likert-option {
            flex: 1; padding: 14px 6px; border: 2px solid var(--gray-200); border-radius: 10px;

        .likert-option.selected { border-color: var(--primary); background: #eff6ff; font-weight: 600; }
        .nav-btns { display: flex; gap: 12px; margin-top: 24px; }
        .btn {
            flex: 1; padding: 14px 24px; border-radius: 10px; font-size: 15px;
            font-weight: 600; cursor: pointer; border: none; transition: all 0.2s ease;
        }
        .btn-primary { background: var(--primary); color: var(--white); }
        .btn-primary:hover { background: #1d4ed8; }
        .btn-primary:disabled { background: var(--gray-300); cursor: not-allowed; }
        .btn-secondary { background: var(--white); color: var(--gray-700); border: 1px solid var(--gray-300); }
        .btn-secondary:hover { background: var(--gray-50); }
        .result-card {
            background: var(--white); border-radius: var(--radius); padding: 32px 24px;

        .result-title { font-size: 22px; font-weight: 700; margin-bottom: 12px; }
        .result-desc {
            font-size: 14px; color: var(--gray-700); margin-bottom: 32px;
            line-height: 1.8; text-align: left; white-space: pre-line;
        }
        .result-desc strong { color: var(--gray-900); font-weight: 600; }
        .result-scores { text-align: left; margin-bottom: 32px; }
        .score-item { margin-bottom: 16px; }
        .score-label { display: flex; justify-content: space-between; font-size: 14px; margin-bottom: 6px; }
        .score-label span:first-child { font-weight: 500; }
        .score-label span:last-child { color: var(--gray-500); }
        .score-bar { height: 8px; background: var(--gray-100); border-radius: 4px; overflow: hidden; }
        .score-fill { height: 100%; background: linear-gradient(90deg, var(--primary), var(--primary-light)); border-radius: 4px; transition: width 0.5s ease; }
        footer {
            text-align: center; padding: 24px 0; font-size: 13px; color: var(--gray-500);
            border-top: 1px solid var(--gray-200); background: var(--white);
        }
        @media (max-width: 480px) {
            .hero h1 { font-size: 24px; }
            .quiz-title { font-size: 20px; }
            .question-text { font-size: 16px; }
            .result-card { padding: 24px 20px; }
            .likert-option { font-size: 11px; padding: 10px 4px; }
        }
    </style>
</head>

                        B: { title: '🌙 你是「凌晨三点刷后台型」', desc: '【焦虑诊断】\n恭喜你（或者说同情你），你是信息流行业的焦虑症晚期患者。你的症状包括但不限于：每隔五分钟刷新一次后台、做梦都在看数据、半夜两点突然惊醒然后打开APP确认成本没有崩。你不是在投流，你是在跟算法谈一场让你夜不能寐的恋爱——而且明显你是被虐的那一方。\n\n【工作画像】\n你对数据的敏感度其实很高，因为你的注意力几乎全在上面。你能察觉到一条计划的微妙变化，能在成本刚开始波动的时候就发现不对劲。但问题是——你发现得太早了。很多时候数据只是在正常波动，你已经开始了全套应激反应。别人投流费钱，你投流费命。\n\n【生活状态】\n你的生活已经被"投流"这件事深度入侵了。吃饭的时候看数据、走路的时候想定向、洗澡的时候突然想到"那条计划是不是该关了"然后湿着手打开手机。你很难真正放松，因为你的大脑后台永远有一个进程在跑："监控广告数据.exe"。\n\n【感情模式】\n谈恋爱的时候你是那种"容易想多"的类型。对方回消息慢了你就会开始分析各种可能性——就像你分析数据波动一样。你的伴侣需要理解的是：你不是不信任TA，你是职业习惯。但你也需要学会：感情不是数据，不需要实时监控。\n\n【内心真相】\n你焦虑的根源不是数据，是"失控感"。你害怕的是"我不知道哪里出了问题"这种无力感。所以你拼命刷数据，不是因为数据本身有多重要，而是因为"看到数据"这个行为给了你一种"我在掌控"的错觉。\n\n【处方】\n第一步：把后台APP从手机首屏移到最后一页。第二步：设定"看数据时间窗口"。第三步：如果实在忍不住想看——那就看，但看完之后深呼吸三次，告诉自己"数据波动是正常的"。', scores: scoreBars },
                        C: { title: '🍵 你是「已麻但还能救」', desc: '【焦虑诊断】\n你不是没有焦虑过，你是焦虑过太多次之后产生了抗体。你的状态介于"我还行"和"算了吧"之间——数据好的时候你没什么反应，数据差的时候你也没什么反应。不是因为你冷血，是因为你已经经历过太多起起落落，神经系统自动帮你降了灵敏度。\n\n【工作画像】\n你是团队里最稳定的存在。不是业绩最稳定，是情绪最稳定。成本崩了别人急得跳脚，你在旁边泡了杯茶说"正常波动"。你的工作风格是"抓大放小"——关键节点你会管，日常波动你不管。你的ROI往往不差，因为你不被情绪干扰判断。\n\n【生活状态】\n你的生活和工作之间有一条比较清晰的界线。下了班就是下了班，天大的事明天再说。你有一两个工作之外的爱好。朋友们觉得你这个人"挺好相处的"，因为你不会随时随地开始聊工作。你的口头禅是："焦虑有什么用。"\n\n【感情模式】\n谈恋爱的时候你是"稳定型依恋"。你不会因为对方一条消息没回就炸毛。你的伴侣跟你在一起很有安全感，因为你情绪稳定、不太作。但有时候对方也会觉得你"是不是没那么在乎"——因为你太淡定了。\n\n【内心真相】\n你的"麻"不是天生的，是被这个行业训练出来的。你曾经也是一个会因为一条计划衰退而睡不着的人，但后来你发现——大部分时候你急也没用。所以你学会了"放下"。但这种放下到底是真的释然，还是"算了算了"的消极回避？\n\n【处方】\n你的状态总体是健康的，但要注意一种风险：从"不焦虑"滑向"不上心"。建议偶尔也给自己打一点鸡血：学一个新技能、试一个新玩法。不是为了卷，是为了让自己重新感受到"我还在成长"。', scores: scoreBars },
                        D: { title: '🧘 你是「淡定老炮」', desc: '【焦虑诊断】\n如果投流行业有"泰山崩于前而色不变"奖，你一定是终身成就奖获得者。你的焦虑等级低到几乎可以忽略——不是装出来的淡定，是真的不在乎了。成本崩了？"哦。"素材衰退了？"知道了。"你的情绪曲线是一条直线。\n\n【工作画像】\n你有两种可能：要么你是入行多年的老炮，见过大风大浪所以什么都不当事了；要么你是一个天生的"低情绪反应"体质，投流这个行业的波动对你来说就像看海浪——你知道它在动但你不会被它卷进去。你的"情绪能耗"极低，别人投流一天像打仗，你投流一天像喝茶。\n\n【生活状态】\n你的生活可能是这八个类型里最健康的。你能真正地下班、真正地周末不看手机、真正地度假时不回工作消息。你的身份认同不是"我是一个投手"而是"我是一个有各种面向的人，投流只是其中一面"。\n\n【感情模式】\n谈恋爱的时候你是"放手型"的伴侣。你给对方很大的空间，不查手机、不翻聊天记录。你的感情观是："如果一段关系需要我时刻盯着才能维持，那它本身就有问题。"这个逻辑跟你看待广告数据的逻辑一模一样。\n\n【内心真相】\n你的淡定可能是真正的智慧，也可能是"习得性漠然"。区分两者的标准是：你是因为看透了、理解了、所以放下了？还是因为累了、倦了、所以不想管了？前者是境界，后者是burnout。\n\n【处方】\n如果你是真的通透——请继续保持，你是这个行业里稀缺的清醒者。但如果你只是累了——建议你给自己放个假，真正的、完全脱离工作的那种。去一个没有信号的地方待三天，回来后问问自己：我还想做这件事吗？', scores: scoreBars },
                        E: { title: '🎰 你是「创意赌徒」', desc: '【焦虑诊断】\n你的焦虑不来自数据本身，而来自"赌注"的大小。每一条新素材、每一条新计划对你来说都是一张彩票——你相信只要压对了，一条就能爆。你的焦虑峰值出现在"新素材刚上线等待判决"的那几个小时，比任何人的心跳都快。\n\n【工作画像】\n你的投放风格是"少而精"或者"大力出奇迹"。你不太喜欢那种同时开几十条计划慢慢优化的方式，你更喜欢集中火力：看准一个方向、砸一批素材、等结果。爆了就是英雄，没爆就换方向再来。你的工作节奏是大开大合的——要么爆量到服务器报警，要么空耗到怀疑人生。\n\n【生活状态】\n生活中你也是个喜欢"押注"的人。投资决策、消费选择、甚至交朋友，你都倾向于"看准了就all in"。你的朋友们觉得你这个人"很有魄力"，但也偶尔会担心你"万一赌错了怎么办"。你的回答通常是："不赌怎么知道？"\n\n【感情模式】\n谈恋爱的时候你是那种"一见钟情型"或者"认定了就不放手"的人。你不会在感情里慢慢试探，你喜欢就冲、不喜欢就撤。你的伴侣会觉得你很有激情，但偶尔也会觉得你太"上头"了——因为你的爱来得又快又猛。\n\n【内心真相】\n你赌的不是素材，是"可能性"。你内心深处相信自己是那个"下一把就能赢"的人。这种信念是你最大的动力，也是你最大的风险。你有没有想过：如果你把同样的精力放在"系统性优化"而不是"赌爆一条"上，结果会不会更好？\n\n【处方】\n你的直觉和魄力是天赋，但投流不是赌场，它是科学。建议你在"赌一把"之前，先做一个低成本的小测试——不是因为你怂，而是因为你值得用更稳定的方式赢。', scores: scoreBars },
                        F: { title: '🤖 你是「算法信徒」', desc: '【焦虑诊断】\n你不焦虑数据，你信仰数据。你的焦虑来源不是波动本身，而是"我是不是没有给算法足够的数据来学习"。当成本崩了的时候，你不会像鸡血战神那样疯狂建计划，也不会像焦虑症患者那样疯狂刷新——你会冷静地分析：样本量够了没有？模型学习了没有？\n\n【工作画像】\n你是团队里的"理性大脑"。你相信系统的力量，相信算法比人更聪明。你的工作方式是：设定好参数，给够预算，让模型跑，然后根据数据反馈做精细化调整。你不喜欢"拍脑袋"做决策，每一个判断都要有数据支撑。你的Excel表格可能是全组最规范的。\n\n【生活状态】\n生活中你也是个"数据驱动"的人。你会记录自己的运动量、睡眠时间、消费明细。你的朋友们觉得你这个人"很靠谱但有点无趣"——因为你做什么都要"先分析一下"。但你自己知道：这不是无趣，这是对效率的极致追求。\n\n【感情模式】\n谈恋爱的时候你是那种"理性浪漫者"——你会分析两个人的匹配度、沟通模式、冲突频率，然后得出结论："我们很合适。"你的伴侣可能会觉得你太理性了，但你认为：真正的爱是建立在理解基础上的，不是盲目的激情。\n\n【内心真相】\n你相信算法，是因为你相信"规律"。你觉得世界是有序的、可预测的、可优化的。但偶尔——只是偶尔——你也会好奇：如果我放下数据，纯凭感觉做一次选择，会发生什么？\n\n【处方】\n你的理性和系统思维是这个行业的稀缺品质。但别忘了：算法的背后是人。建议你在下一次做决策的时候，也问问自己"直觉怎么说"——有时候，数据之外的答案反而更准确。', scores: scoreBars },
                        G: { title: '🎭 你是「汇报表演家」', desc: '【焦虑诊断】\n你的焦虑不在数据上，在"怎么把数据说出去"上。数据好的时候你开心，数据差的时候你——开始做PPT。你的核心焦虑不是"ROI跌了"而是"我怎么让老板觉得ROI没跌"。你不是在投流，你是在运营一场持续的信息披露工程。\n\n【工作画像】\n你是团队里最懂"包装"的人。同样的数据，经你的手汇报出来，效果能差出30%。你擅长用同比代替环比、用累计数据代替单日数据、用"曝光量增长"来淡化"转化率下降"。这不是撒谎，这是"选择性呈现"。你的领导可能不知道真相，但你的同事都在默默学你的PPT技巧。\n\n【生活状态】\n生活中你也是个"形象管理大师"。你的朋友圈永远光鲜亮丽——不是因为你过得好，是因为你会挑照片。你很少在社交场合说自己的失败，但非常擅长把自己的小成就讲成大故事。朋友们觉得你"活得精致"，只有你自己知道背后花了多少功夫在"经营人设"。\n\n【感情模式】\n谈恋爱的时候你是那种"仪式感拉满"的人。纪念日、惊喜、朋友圈官宣，一个都不能少。你的伴侣很享受被你"精心包装"的感觉，但偶尔也会好奇："你对我，是真的还是演出来的？"你需要证明给TA看：你的爱不是表演，是真心——只是碰巧也很会包装。\n\n【内心真相】\n你擅长呈现美好，是因为你害怕面对"不够好"的现实。你的PPT越漂亮，可能说明你内心越焦虑。你有没有想过：如果有一天你交了一份"不好看但真实"的报告，世界会不会照样转？答案是——会。\n\n【处方】\n你的表达能力和呈现技巧是巨大的优势，但真实的勇气比包装的能力更稀缺。建议你在下一次汇报的时候，尝试一次"原封不动"的数据呈现——你会发现，领导和同事可能比你想象的更成熟。', scores: scoreBars },
                        H: { title: '🏃 你是「随时准备转行型」', desc: '【焦虑诊断】\n你不是焦虑，你是倦怠。你的焦虑等级看起来低，不是因为你内心平静，而是因为你的心已经不在这里了。成本崩了你不急，因为你觉得"这破工作不值得我急"。素材衰退你不慌，因为你已经在想"转行之后再也不用看这些数据了"。\n\n【工作画像】\n你还在投流，但你已经不是"全身心投入"的状态了。你完成工作，但你不再追求卓越。你会按时交报表，但你不会再额外花时间优化。你的同事觉得你"变佛系了"，只有你自己知道：你不是佛系，你是已经在看外面的机会了。你的简历可能已经更新了，只是还没勇气点"投递"。\n\n【生活状态】\n你的生活重心已经悄悄转移到了"工作之外"。你开始发展副业、学习新技能、认识其他行业的人。你的朋友们觉得你"最近活得挺开阔的"，因为你聊的话题不再只有"ROI"和"转化率"了。你自己感觉"终于呼吸到了新鲜空气"。\n\n【感情模式】\n如果你的伴侣也做投流，你们可能经常一起吐槽这个行业。如果TA不做，你反而觉得轻松——因为"至少在家里可以不聊工作"。你在感情里的状态跟你在工作中一样：人在，但灵魂已经在规划下一步了。\n\n【内心真相】\n你不是不爱这份工作了，你是被它消耗得太久了。"随时准备转行"不是逃避，而是一种自我保护机制——你的潜意识在告诉你："这个环境已经不再滋养你了。"但你需要想清楚：你是真的想离开，还是只是需要休息？\n\n【处方】\n在你做"转行"这个重大决定之前，建议你先做一件事：请一周年假，完全脱离工作环境。回来后问自己：我是想念这个行业了，还是如释重负？如果是前者——也许你只是累了；如果是后者——那么是时候认真规划下一步了。', scores: scoreBars }
                    };

                        'HHHHM': { emoji: '🤷', name: '无所谓人 OJBK', desc: '【人格总览】\n你是一个"对什么都无所谓"的人。不是因为你真的不在乎，而是因为你发现"在乎了也没用"。你选择了一种"佛系+摆烂"的生活方式。\n\n【社交模式】\n你社交的基本策略是"都行、可以、没关系"。你不会拒绝社交，但你也不会主动。你觉得"去了也行不去也行"。\n\n【感情态度】\n你在感情里是"随缘型"。你不会主动追求，也不会刻意拒绝。你觉得"有也行没有也行"，这种态度让你看起来很高冷但其实只是不在乎。\n\n【工作风格】\n你在工作中是"做完就行"的类型。你不会追求完美，不会精益求精，你会做到"差不多"就停手。你的座右铭是"OJBK"。\n\n【内心独白】\n"都行，无所谓，OJBK。"' },

                        'HHHHH': { emoji: '👑', name: '领导者 BOSS', desc: '【人格总览】\n你是一个"天生的领导者"。不是因为你刻意要当老大，而是因为你有一种"让人想跟着你走"的气场。你自信、果断、有方向感。\n\n【社交模式】\n你社交的基本策略是"主动掌控局面"。你会在社交场合自然地成为焦点，会主动组织活动、安排事情、分配任务。别人觉得你"很有领导力"。\n\n【感情态度】\n你在感情里是"主导型"。你会主动规划未来、主动解决问题、主动推进关系。你的伴侣会觉得"跟着你就对了"。\n\n【工作风格】\n你在工作中是"天生的管理者"。你会主动承担责任、主动分配任务、主动推进进度。你是团队里那个"没了他不行"的人。\n\n【内心独白】\n"跟着我走就对了。"' },
                        'HLHLL': { emoji: '🌟', name: '傻乐者 HHHH', desc: '【人格总览】\n你是全网最快乐的仔。不是因为你生活完美，而是因为你天生有一种"什么事都能当成乐子"的能力。别人看到的是灾难，你看到的是喜剧。\n\n【社交模式】\n你是社交场合的气氛组。你不一定是最会说话的，但你一定是让人最开心的。\n\n【感情态度】\n你在感情里是那种"傻乎乎的真诚"。你不会套路，你就是直接——直接到对方觉得你可爱。\n\n【工作风格】\n你在工作中是"乐在其中"的类型。就算工作内容很无聊，你也能找到有趣的点。\n\n【内心独白】\n"哈哈哈哈哈哈"' }
                    };

                    // 构建用户的5大模型等级
                    function getModelLevel(levels) {
                        let h = (levels.match(/H/g) || []).length;
                        let l = (levels.match(/L/g) || []).length;
                        if (h >= 2) return 'H';
                        if (l >= 2) return 'L';
                        return 'M';
                    }

                    // 匹配27种人格 - 使用5模型(S/E/A/Ac/So)平均值
                    const pattern = sModel + eModel + aModel + acModel + soModel;

                    // 直接匹配
                    if (personalities[pattern]) {
                        let p = personalities[pattern];
                        let dimBars = dims.map(d => ({ name: d, label: getLevel(dimScores[d]), pct: Math.round(dimScores[d] / 6 * 100) }));
                        return { title: p.emoji + ' ' + p.name, desc: p.desc, scores: dimBars };
                    }

                    // 兜底匹配 - 找最接近的人格
                    let bestMatch = 'LLLLL';
                    let bestDist = Infinity;
                    const order = ['L', 'M', 'H'];
                    Object.keys(personalities).forEach(k => {
                        let dist = 0;
                        for (let i = 0; i < pattern.length; i++) {
                            dist += Math.abs(order.indexOf(pattern[i]) - order.indexOf(k[i]));
                        }
                        if (dist < bestDist) { bestDist = dist; bestMatch = k; }
                    });

                    let p = personalities[bestMatch];
                    let dimBars = dims.map(d => ({ name: d, label: getLevel(dimScores[d]), pct: Math.round(dimScores[d] / 6 * 100) }));
                    return { title: p.emoji + ' ' + p.name, desc: p.desc, scores: dimBars };
        ];

        let currentQuiz = null, currentQuestion = 0, answers = [];

        function renderQuizList() {
            document.getElementById('quiz-list').innerHTML = quizzes.map(q =>
                `<div class="quiz-card" onclick="startQuiz('${q.id}')">
                    <div class="quiz-icon">${q.icon}</div><h3>${q.title}</h3><p>${q.description}</p>
                    <div class="quiz-meta"><span>📋 ${q.questionCount}道题</span><span>⏱ ${q.duration}</span></div>
                </div>`
            ).join('');
        }

        function showPage(id) { document.querySelectorAll('.page').forEach(p => p.classList.remove('active')); document.getElementById(id).classList.add('active'); window.scrollTo(0, 0); }
        function goHome() { currentQuiz = null; currentQuestion = 0; answers = []; showPage('home-page'); }
        function shuffleArray(arr) { for (let i = arr.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1)); [arr[i], arr[j]] = [arr[j], arr[i]]; } return arr; }

        function startQuiz(quizId) {
            currentQuiz = quizzes.find(q => q.id === quizId);
            currentQuestion = 0;
            answers = new Array(currentQuiz.questions.length).fill(null);
            if (!currentQuiz.scaleType) currentQuiz.shuffled = shuffleArray([...currentQuiz.questions]);
            document.getElementById('quiz-title').textContent = currentQuiz.title;
            document.getElementById('quiz-desc').textContent = currentQuiz.description;
            showPage('quiz-page');
            renderQuestion();
        }

        function getCurrentQuestions() {
            return currentQuiz.scaleType ? currentQuiz.questions : currentQuiz.shuffled;
        }

        function renderQuestion() {
            const qs = getCurrentQuestions();
            const q = qs[currentQuestion];
            const total = qs.length;
            const progress = ((currentQuestion + 1) / total) * 100;
            document.getElementById('progress-fill').style.width = progress + '%';
            document.getElementById('question-counter').textContent = `第 ${currentQuestion + 1} 题，共 ${total} 题`;
            document.getElementById('question-text').textContent = q.text;

            const area = document.getElementById('answer-area');

            if (currentQuiz.scaleType) {
                // 量表题
                area.innerHTML = `<div class="likert-scale">${likertLabels.map((label, i) =>
                    `<div class="likert-option ${answers[currentQuestion] && answers[currentQuestion].index === i ? 'selected' : ''}" onclick="selectLikert(${i})">${label}</div>`
                ).join('')}</div>`;
            } else {
                // 四选一
                area.innerHTML = `<div class="options">${q.options.map((opt, i) =>
                    `<div class="option ${answers[currentQuestion] && answers[currentQuestion].index === i ? 'selected' : ''}" onclick="selectOption(${i})">${opt.text}</div>`
                ).join('')}</div>`;
            }

            document.getElementById('prev-btn').style.display = currentQuestion > 0 ? 'block' : 'none';
            document.getElementById('next-btn').style.display = 'none';
        }

        function selectLikert(index) {
            answers[currentQuestion] = { index, scores: currentQuiz.questions[currentQuestion].scores };
            const qs = getCurrentQuestions();
            if (currentQuestion < qs.length - 1) { currentQuestion++; renderQuestion(); }
            else { showResult(); }
        }

        function selectOption(index) {
            answers[currentQuestion] = { index, scores: getCurrentQuestions()[currentQuestion].options[index].scores };
            const qs = getCurrentQuestions();
            if (currentQuestion < qs.length - 1) { currentQuestion++; renderQuestion(); }
            else { showResult(); }
        }

        function nextQuestion() {
            if (!answers[currentQuestion]) return;
            const qs = getCurrentQuestions();
            if (currentQuestion < qs.length - 1) { currentQuestion++; renderQuestion(); }
            else { showResult(); }
        }

        function prevQuestion() {
            if (currentQuestion > 0) { currentQuestion--; renderQuestion(); }
        }

        function showResult() {
            const result = currentQuiz.calculateResult(answers.filter(a => a !== null));
            document.getElementById('result-title').textContent = result.title;
            document.getElementById('result-desc').innerHTML = result.desc.replace(/\n/g, '<br>');
            document.getElementById('result-scores').innerHTML = result.scores.map(s =>
                `<div class="score-item"><div class="score-label"><span>${s.name}</span><span>${s.label}</span></div><div class="score-bar"><div class="score-fill" style="width:${s.pct}%"></div></div></div>`
            ).join('');
            showPage('result-page');
        }

        renderQuizList();
    </script>
